<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>He Thong Giam Sat IoT</title>
    <!-- Nhung thu vien Chart.js de ve bieu do giong slide 266 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .chart-box { width: 100%; margin: 20px 0; }
        
        /* Cau hinh nut bam doi mau sac theo trang thai den LED thuc te */
        .btn { padding: 15px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-off { background-color: #cccccc; color: #333333; }
        .btn-on { background-color: #ffcc00; color: #000000; box-shadow: 0 0 15px #ffcc00; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Trang Web Giam Sat Nhiet Do - Do Am va Dieu Khien LED</h2>
        
        <!-- Khu vuc hien thi bieu do line chart -->
        <div class="chart-box">
            <canvas id="iotChart"></canvas>
        </div>
        
        <hr>
        
        <!-- Khoi dieu khien bat tat den LED -->
        <div style="margin-top: 20px;">
            <h3>Trang thai den LED hien tai:</h3>
            <!-- Neu bien led=1 thi dung class btn-on (nut sang va vang), nguoc lai dung class btn-off (nut xam) -->
            <button id="ledBtn" class="btn {% if led == 1 %}btn-on{% else %}btn-off{% endif %}" onclick="toggleLed()">
                {% if led == 1 %}LED DANG SANG{% else %}LED DANG TAT{% endif %}
            </button>
        </div>
    </div>

    <script>
        // 1. Nhan mang du lieu tu file app.py truyen sang Web
        const labels = {{ labels | tojson }};
        const tempCtx = {{ temp | tojson }};
        const humCtx = {{ hum | tojson }};

        // 2. Cau hinh bieu do hien thi 2 duong doc lap (Nhiet do va Do am)
        const ctx = document.getElementById('iotChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Nhiet do (C)',
                        data: tempCtx,
                        borderColor: 'red',
                        backgroundColor: 'rgba(255, 0, 0, 0.1)',
                        tension: 0.3
                    },
                    {
                        label: 'Do am (%)',
                        data: humCtx,
                        borderColor: 'blue',
                        backgroundColor: 'rgba(0, 0, 255, 0.1)',
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });

        // 3. Ham xu ly khi click vao nut bam bang ky thuat AJAX khong can load lai trang
        function toggleLed() {
            fetch('/toggle')
                .then(response => response.json())
                .then(data => {
                    const btn = document.getElementById('ledBtn');
                    if (data.status === 1) {
                        btn.className = 'btn btn-on';
                        btn.innerText = 'LED DANG SANG';
                    } else {
                        btn.className = 'btn btn-off';
                        btn.innerText = 'LED DANG TAT';
                    }
                })
                .catch(err => console.error('Loi khi toggle LED:', err));
        }
    </script>
</body>
</html>
